name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate marketplace.yaml
        # Uses the latest published Hex CLI — pin to a specific version
        # (`@hexology/hex@0.x.y`) if you want a reproducible CI gate.
        run: npx --yes @hexology/hex@latest marketplace validate marketplace.yaml
