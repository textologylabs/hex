type: component
name: node-ts-cli
version: 0.2.0
kind: cli

prompts:
  - project_name:
      type: string
      required: true
      description: Package name (e.g. my-cli)
      pattern: '^[a-z][a-z0-9-]*$'
  - description:
      type: string
      default: ''
      description: Short description
  - author:
      type: string
      default: ''
      description: Author
  - license:
      type: enum
      choices: [MIT, Apache-2.0]
      default: MIT
      description: License
  - include_examples:
      type: boolean
      default: true
      description: Include an example "hello" command?
  - include_self_update:
      type: boolean
      default: true
      description: Include a self-update prompt on launch?
  - include_publish_workflow:
      type: boolean
      default: true
      description: Include a GitHub Actions workflow that publishes on tag?

# Section grouping drives the questionnaire UX — outline shown up front,
# header per section, (N/M) progress per question. Every prompt must be
# assigned exactly once.
sections:
  - title: Basics
    prompts: [project_name, description, author]
  - title: Licence
    prompts: [license]
  - title: Features
    prompts: [include_examples, include_self_update, include_publish_workflow]

# `include:` gates whole files; the `delete` hook below clears subtrees.
# Use `include:` for single-file gating (one rule per file) and the
# `delete` hook for many-file subtree gating against a glob.
include:
  - { path: 'src/update.ts', when: 'include_self_update' }
  - { path: '.github/workflows/publish.yml', when: 'include_publish_workflow' }

hooks:
  post_render:
    - rename: { from: gitignore, to: .gitignore }
    - delete: { glob: 'src/examples/**', when: 'not include_examples' }

# Post-scaffold tasks the user must complete before the project is fully
# wired up. Hex tracks status in <project>/.hex/checklist.yaml; users walk
# through them via the post-`hex new` interactive flow or `hex setup`.
setup:
  message: |
    Your CLI is scaffolded. A few things to wire up before it can publish:
  tasks:
    - id: install-deps
      title: Install dependencies
      run: npm install
    - id: git-init
      title: Initialise a git repository
      run: git init -b main
    - id: git-stage
      title: Stage every scaffolded file
      run: git add .
    - id: git-commit-initial
      title: Make the initial commit
      run: git commit -m "initial commit"
    - id: configure-git-remote
      title: Connect the repo to GitHub
      detail: |
        Create a new repo on GitHub, then connect + push from your project root:
          git remote add origin <your-github-url>
          git push -u origin main
    - id: open-npm-tokens
      title: Open the npm tokens page to mint an automation token
      open: https://www.npmjs.com/
      detail: |
        Sign in, head to Access Tokens → Generate New Token → Automation.
        (Skip if you opted out of the publish workflow.)
    - id: set-npm-token
      title: Save the token as a GitHub repo secret
      run: gh secret set NPM_TOKEN
      detail: |
        Pastes your NPM_TOKEN into the repo's Actions secrets.
        (Skip if you opted out of the publish workflow.)
    - id: first-release
      title: Tag + push the first release
      detail: |
        Bump the version (e.g. `npm version 0.1.0`), then push the tag:
          git push --follow-tags
        The publish workflow will build and push the package to npm.
        (Skip if you opted out of the publish workflow.)
