type: component
name: vite-ts-spa
version: 0.1.0
kind: webapp

prompts:
  - project_name:
      type: string
      required: true
      description: Package name (e.g. my-app)
      pattern: '^[a-z][a-z0-9-]*$'
  - description:
      type: string
      default: ''
      description: Short description
  - author:
      type: string
      default: ''
      description: Author
  - license:
      type: enum
      choices: [MIT, Apache-2.0]
      default: MIT
      description: License

sections:
  - title: Basics
    prompts: [project_name, description, author]
  - title: Licence
    prompts: [license]

# Deploy + CI/CD (M12). The generated app pins both stanzas in its
# lockfile at render time, so `hex deploy` knows what adapter to invoke
# and a `cicd-github-actions` provider can emit a workflow that calls
# the same adapter on every push.
deploy:
  adapter: vercel

cicd:
  provider: github-actions
  node-version: '20'

hooks:
  post_render:
    - rename: { from: gitignore, to: .gitignore }

setup:
  message: |
    Your Vite SPA is scaffolded. A few things to wire up before it can deploy:
  tasks:
    - id: install-deps
      title: Install dependencies
      run: npm install
    - id: git-init
      title: Initialise a git repository
      run: git init -b main
    - id: git-stage
      title: Stage every scaffolded file
      run: git add .
    - id: git-commit-initial
      title: Make the initial commit
      run: git commit -m "initial commit"
    - id: configure-git-remote
      title: Connect the repo to GitHub
      detail: |
        Create a new repo on GitHub, then connect + push from your project root:
          git remote add origin <your-github-url>
          git push -u origin main
    - id: vercel-link
      title: Link the project to Vercel
      run: npx --yes vercel link
      detail: |
        Creates a .vercel/ folder linking this project to a Vercel project
        (already in .gitignore). The vercel CLI is fetched on-demand via npx
        — no global install required. Accept its interactive prompts.
    - id: configure-vercel-token
      title: Configure the Vercel deploy token
      open: https://vercel.com/account/tokens
      run: gh secret set VERCEL_TOKEN
      detail: |
        On the tokens page, mint a new token (any name, no expiry needed,
        default scope), then copy it to your clipboard. Return here and
        paste it at the `gh secret set` prompt — Hex stores it as the
        repo's VERCEL_TOKEN secret, which the deploy workflow at
        .github/workflows/deploy.yml uses on every push to main.
    - id: first-deploy
      title: First deploy
      run: hex deploy
      detail: |
        On success, Hex prints the deploy URL. Subsequent pushes to `main`
        trigger the GitHub Actions workflow to deploy automatically.
